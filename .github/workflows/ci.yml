name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest

  node-tests:
    name: Node (built-in test runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install root deps
        run: npm ci || npm install
      - name: Run tests
        run: npm test
